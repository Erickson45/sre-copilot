version: '3.8'

services:
  sre-copilot-api:
    build: .
    ports:
      - "5000:5000"
    environment:
      - OLLAMA_URL=http://ollama:11434/api/generate
      - MODEL_NAME=llama3
      - WEBHOOK_URL=
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data: